<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>حرب الأمم</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- شاشة البداية مع الشعارات -->
  <div id="splash-screen">
    <div id="studio-logo" class="splash-logo">
      <img src="assets/studio-logo.png" alt="شعار الاستوديو" id="studio-img">
    </div>
    <div id="server-logo" class="splash-logo" style="display:none;">
      <img src="assets/server-logo.png" alt="شعار السيرفر" id="server-img">
    </div>
  </div>

  <!-- شاشة تسجيل الدخول والقائمة الرئيسية -->
  <div id="main-menu" style="display:none;">
    <h1>حرب الأمم</h1>
    <div id="login-section">
      <h2>تسجيل الدخول</h2>
      <input type="text" id="username" placeholder="اسم المستخدم">
      <input type="password" id="password" placeholder="كلمة المرور">
      <button id="login-btn">دخول كلاعب</button>
      <button id="owner-login-btn">دخول كمالك</button>
      <div id="owner-password-section" style="display:none;">
        <input type="password" id="owner-password" placeholder="كلمة المالك">
        <button id="confirm-owner-login">تأكيد دخول مالك</button>
      </div>
      <button id="register-btn">إنشاء حساب جديد</button>
      <div id="register-section" style="display:none;">
        <input type="password" id="reg-password" placeholder="كلمة المرور">
        <button id="confirm-register">تأكيد التسجيل</button>
      </div>
    </div>
  </div>

  <!-- واجهة اللعبة الرئيسية -->
  <div id="game-interface" style="display:none;">
    <div id="game-header">
      <span id="player-info">مرحباً، لاعب</span>
      <button id="logout-btn">تسجيل الخروج</button>
    </div>
    <div id="game-container">
      <canvas id="game-canvas"></canvas>
    </div>
    <div id="toolbar">
      <!-- أزرار اللاعب الافتراضية -->
      <div class="toolbar-group" id="player-tools">
        <button class="tool-btn" data-action="pan">✋ تحريك</button>
        <button class="tool-btn" data-action="select">🔍 تحديد</button>
        <button class="tool-btn" data-action="attack">⚔️ هجوم</button>
        <button class="tool-btn" data-action="diplomacy">🤝 دبلوماسية</button>
      </div>
      <!-- أزرار المالك تظهر فقط عند الدخول كمالك -->
      <div class="toolbar-group" id="owner-tools" style="display:none;">
        <button class="tool-btn" data-action="add-resource">⛏️ موارد</button>
        <button class="tool-btn" data-action="edit-terrain">🏔️ تضاريس</button>
        <button class="tool-btn" data-action="edit-nation">🏴 دولة</button>
        <button class="tool-btn" data-action="settings">⚙️ إعدادات</button>
      </div>
    </div>
    <!-- شريط الدردشة مخفي افتراضياً، يمكن إظهاره بزر -->
    <div id="chat-panel" style="display:none;">
      <div id="chat-messages"></div>
      <div id="chat-input-area">
        <input type="text" id="chat-input" placeholder="اكتب رسالة...">
        <button id="send-chat">إرسال</button>
      </div>
    </div>
  </div>

  <script src="client.js"></script>
</body>
          </html>
