<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Bone Brawl - مصارعة الهياكل</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: manipulation;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
      font-family: 'Segoe UI', Tahoma, sans-serif;
    }
    #gameCanvas {
      display: block;
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    /* واجهة المستخدم */
    #uiLayer {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 5;
    }
    #uiLayer > * { pointer-events: auto; }
    /* شاشة البداية */
    #mainMenu {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a0a1a 100%);
      z-index: 20;
      transition: opacity 0.5s, visibility 0.5s;
    }
    #mainMenu.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    #menuContent {
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    #menuContent .logo {
      font-size: 4em;
      display: block;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
    #menuContent h1 {
      color: #FFE082;
      font-size: 2.5em;
      margin: 10px 0;
      text-shadow: 0 0 30px rgba(255, 224, 130, 0.5);
      letter-spacing: 2px;
    }
    #menuContent .subtitle {
      color: #aaa;
      font-size: 1em;
      margin-bottom: 20px;
    }
    #menuContent input {
      width: 100%;
      padding: 14px 20px;
      border-radius: 30px;
      border: 2px solid #4ECDC4;
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 1.1em;
      text-align: center;
      outline: none;
      margin-bottom: 15px;
      transition: border-color 0.3s;
    }
    #menuContent input:focus { border-color: #FFE082; }
    #playBtn {
      width: 100%;
      padding: 16px;
      border-radius: 30px;
      border: none;
      background: linear-gradient(135deg, #FF6B6B, #FF8E53);
      color: #fff;
      font-size: 1.3em;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 5px 25px rgba(255, 107, 107, 0.4);
    }
    #playBtn:active { transform: scale(0.95); }
    #playBtn:disabled {
      background: #555;
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }
    #statusText {
      color: #4ECDC4;
      margin-top: 15px;
      font-size: 0.9em;
      min-height: 25px;
    }
    /* شاشة الانتظار */
    #waitingScreen {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: none;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.8);
      z-index: 18;
    }
    #waitingScreen.active { display: flex; }
    #waitBox {
      background: #1a1a3e;
      border: 2px solid #4ECDC4;
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    #waitBox h2 { color: #FFE082; margin-bottom: 10px; }
    #waitBox .playersList {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin: 15px 0;
    }
    #waitBox .playerTag {
      background: rgba(255,255,255,0.1);
      padding: 8px 16px;
      border-radius: 20px;
      color: #fff;
      font-size: 0.9em;
      border: 2px solid transparent;
    }
    #waitBox .playerTag.me { border-color: #FFE082; }
    #waitBox .countdown {
      color: #FF6B6B;
      font-size: 2em;
      font-weight: bold;
      margin: 15px 0;
    }
    #waitBox .hint {
      color: #aaa;
      font-size: 0.85em;
    }
    /* شاشة نهاية اللعبة */
    #endScreen {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: none;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.85);
      z-index: 19;
    }
    #endScreen.active { display: flex; }
    #endBox {
      background: #1a1a3e;
      border: 2px solid #FFE082;
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }
    #endBox h2 { color: #FFE082; margin-bottom: 15px; }
    #endBox .rankItem {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      color: #fff;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    #endBox .rankItem:first-child { color: #FFE082; font-weight: bold; font-size: 1.1em; }
    #endBox button {
      margin-top: 15px;
      padding: 12px 30px;
      border-radius: 25px;
      border: none;
      background: #4ECDC4;
      color: #000;
      font-weight: bold;
      font-size: 1.1em;
      cursor: pointer;
    }
    /* HUD */
    #hud {
      position: absolute;
      top: 10px; left: 10px; right: 10px;
      display: none;
      justify-content: space-between;
      align-items: flex-start;
      z-index: 10;
    }
    #hud.active { display: flex; }
    #healthBar {
      background: rgba(0,0,0,0.6);
      border-radius: 10px;
      padding: 5px 12px;
      color: #fff;
      font-size: 0.9em;
    }
    #healthFill {
      background: #FF6B6B;
      height: 6px;
      border-radius: 3px;
      transition: width 0.3s;
      margin-top: 3px;
    }
    #timerDisplay {
      background: rgba(0,0,0,0.6);
      border-radius: 10px;
      padding: 5px 15px;
      color: #FFE082;
      font-weight: bold;
      font-size: 1.1em;
    }
    #scoreDisplay {
      background: rgba(0,0,0,0.6);
      border-radius: 10px;
      padding: 5px 12px;
      color: #4ECDC4;
      font-size: 0.9em;
    }
  </style>
</head>
<body>

  <!-- شاشة البداية -->
  <div id="mainMenu">
    <div id="menuContent">
      <span class="logo">💀</span>
      <h1>Bone Brawl</h1>
      <p class="subtitle">مصارعة فيزيائية للهياكل العظمية</p>
      <input type="text" id="nameInput" placeholder="أدخل اسمك..." maxlength="15" autocomplete="off">
      <button id="playBtn">🔥 انضم للقتال</button>
      <div id="statusText"></div>
    </div>
  </div>

  <!-- شاشة الانتظار -->
  <div id="waitingScreen">
    <div id="waitBox">
      <h2>⏳ بانتظار اللاعبين...</h2>
      <div class="playersList" id="playersList"></div>
      <div class="countdown" id="countdownDisplay"></div>
      <p class="hint" id="waitHint">الحد الأدنى: لاعبان | الحد الأقصى: 4 لاعبين</p>
    </div>
  </div>

  <!-- شاشة النهاية -->
  <div id="endScreen">
    <div id="endBox">
      <h2>🏆 نهاية القتال</h2>
      <div id="rankList"></div>
      <button id="replayBtn">🔄 العب مجدداً</button>
    </div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div id="healthBar">
      ❤️ الصحة
      <div id="healthFill" style="width: 100%;"></div>
    </div>
    <div id="timerDisplay">2:00</div>
    <div id="scoreDisplay">💀 0</div>
  </div>

  <!-- طبقة الرندر -->
  <canvas id="gameCanvas"></canvas>

  <!-- Scripts -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
      }
    }
  </script>
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ╔══════════════════════════════════════╗
    // ║        المتغيرات العامة            ║
    // ╚══════════════════════════════════════╝
    const canvas = document.getElementById('gameCanvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x1a1a2e);
    scene.fog = new THREE.Fog(0x1a1a2e, 15, 40);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.5, 60);
    camera.position.set(0, 12, 15);
    camera.lookAt(0, 0, 0);

    // إضاءة
    const ambientLight = new THREE.AmbientLight(0x404060, 1.5);
    scene.add(ambientLight);
    const dirLight = new THREE.DirectionalLight(0xffffff, 2);
    dirLight.position.set(10, 20, 5);
    dirLight.castShadow = true;
    dirLight.shadow.mapSize.width = 1024;
    dirLight.shadow.mapSize.height = 1024;
    dirLight.shadow.camera.near = 0.5;
    dirLight.shadow.camera.far = 60;
    dirLight.shadow.camera.left = -20;
    dirLight.shadow.camera.right = 20;
    dirLight.shadow.camera.top = 20;
    dirLight.shadow.camera.bottom = -20;
    scene.add(dirLight);

    // أرضية الحلبة
    const ringGeo = new THREE.CylinderGeometry(6, 6.5, 0.3, 32);
    const ringMat = new THREE.MeshStandardMaterial({ color: 0x333344, roughness: 0.5, metalness: 0.3 });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.y = -0.15;
    ring.castShadow = true;
    ring.receiveShadow = true;
    scene.add(ring);

    // حواجز الحلبة
    const ropeGeo = new THREE.TorusGeometry(5.8, 0.1, 8, 48);
    for (let h = 0; h < 3; h++) {
      const rope = new THREE.Mesh(ropeGeo, new THREE.MeshStandardMaterial({ color: 0xFF6B6B, roughness: 0.7 }));
      rope.position.y = 0.5 + h * 0.7;
      rope.rotation.x = Math.PI / 2;
      rope.castShadow = true;
      rope.receiveShadow = true;
      scene.add(rope);
    }
    // أعمدة الزوايا
    for (let i = 0; i < 4; i++) {
      const angle = (i / 4) * Math.PI * 2;
      const postGeo = new THREE.CylinderGeometry(0.2, 0.2, 2.8, 8);
      const post = new THREE.Mesh(postGeo, new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.6 }));
      post.position.set(Math.cos(angle) * 5.8, 1.4, Math.sin(angle) * 5.8);
      post.castShadow = true;
      scene.add(post);
    }

    // أشياء قابلة للكسر حول الحلبة
    const breakables = [];
    const breakableMeshes = [];

    function createBreakable(x, z) {
      const size = 0.3 + Math.random() * 0.5;
      const geo = new THREE.BoxGeometry(size, size * (1 + Math.random()), size);
      const mat = new THREE.MeshStandardMaterial({
        color: new THREE.Color().setHSL(Math.random() * 0.1 + 0.05, 0.6, 0.3 + Math.random() * 0.3),
        roughness: 0.6,
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.set(x, size / 2, z);
      mesh.rotation.y = Math.random() * Math.PI;
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      mesh.userData = { health: 50 + Math.random() * 50, isBreakable: true };
      scene.add(mesh);
      breakables.push(mesh);
      breakableMeshes.push(mesh);
      return mesh;
    }

    // توليد أشياء قابلة للكسر
    for (let i = 0; i < 15; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = 7 + Math.random() * 3;
      createBreakable(Math.cos(angle) * dist, Math.sin(angle) * dist);
    }

    // جسيمات الكسر
    const debrisParticles = [];

    function spawnDebris(position) {
      const count = 8 + Math.floor(Math.random() * 8);
      for (let i = 0; i < count; i++) {
        const geo = new THREE.SphereGeometry(0.05 + Math.random() * 0.1, 4, 4);
        const mat = new THREE.MeshStandardMaterial({
          color: new THREE.Color().setHSL(0.08, 0.5, 0.3),
          roughness: 0.5,
        });
        const particle = new THREE.Mesh(geo, mat);
        particle.position.copy(position);
        particle.userData = {
          velocity: new THREE.Vector3(
            (Math.random() - 0.5) * 5,
            Math.random() * 6 + 2,
            (Math.random() - 0.5) * 5
          ),
          life: 1.5 + Math.random(),
        };
        scene.add(particle);
        debrisParticles.push(particle);
      }
    }

    // ╔══════════════════════════════════════╗
    // ║        إنشاء شخصية هيكل عظمي       ║
    // ║     (متوافقة مع هيكل Mixamo)       ║
    // ╚══════════════════════════════════════╝
    function createSkeletonCharacter(colorHex) {
      const group = new THREE.Group();
      const color = new THREE.Color(colorHex);

      // مادة العظام
      const boneMat = new THREE.MeshStandardMaterial({
        color: 0xeeeeee,
        roughness: 0.4,
        metalness: 0.1,
      });
      const darkBoneMat = new THREE.MeshStandardMaterial({
        color: 0xcccccc,
        roughness: 0.5,
        metalness: 0.1,
      });

      // الحوض (الجذر - root bone)
      const pelvisGeo = new THREE.BoxGeometry(0.35, 0.2, 0.25);
      const pelvis = new THREE.Mesh(pelvisGeo, boneMat);
      pelvis.position.y = 0.9;
      pelvis.castShadow = true;
      pelvis.name = 'mixamorig:Hips'; // متوافق مع Mixamo
      group.add(pelvis);

      // العمود الفقري
      const spineGeo = new THREE.BoxGeometry(0.25, 0.35, 0.2);
      const spine = new THREE.Mesh(spineGeo, boneMat);
      spine.position.y = 1.2;
      spine.castShadow = true;
      spine.name = 'mixamorig:Spine';
      group.add(spine);

      // الصدر
      const chestGeo = new THREE.BoxGeometry(0.3, 0.3, 0.2);
      const chest = new THREE.Mesh(chestGeo, boneMat);
      chest.position.y = 1.5;
      chest.castShadow = true;
      chest.name = 'mixamorig:Spine1';
      group.add(chest);

      // الرقبة
      const neckGeo = new THREE.CylinderGeometry(0.06, 0.08, 0.15, 8);
      const neck = new THREE.Mesh(neckGeo, boneMat);
      neck.position.y = 1.75;
      neck.castShadow = true;
      neck.name = 'mixamorig:Neck';
      group.add(neck);

      // الرأس (جمجمة)
      const headGroup = new THREE.Group();
      headGroup.position.y = 1.95;
      headGroup.name = 'mixamorig:Head';

      const skullGeo = new THREE.SphereGeometry(0.15, 16, 12);
      const skull = new THREE.Mesh(skullGeo, boneMat);
      skull.scale.set(1, 1.2, 0.9);
      skull.castShadow = true;
      headGroup.add(skull);

      // الفك السفلي
      const jawGeo = new THREE.BoxGeometry(0.14, 0.05, 0.1);
      const jaw = new THREE.Mesh(jawGeo, darkBoneMat);
      jaw.position.set(0, -0.08, 0.03);
      headGroup.add(jaw);

      // عيون متوهجة
      const eyeGeo = new THREE.SphereGeometry(0.04, 8, 8);
      const eyeMat = new THREE.MeshStandardMaterial({
        color: colorHex,
        emissive: colorHex,
        emissiveIntensity: 2,
        roughness: 0.2,
      });
      const leftEye = new THREE.Mesh(eyeGeo, eyeMat);
      leftEye.position.set(-0.05, 0.04, -0.12);
      headGroup.add(leftEye);
      const rightEye = new THREE.Mesh(eyeGeo, eyeMat);
      rightEye.position.set(0.05, 0.04, -0.12);
      headGroup.add(rightEye);

      group.add(headGroup);

      // الذراع اليسرى العلوية
      const leftUpperArmGeo = new THREE.CylinderGeometry(0.05, 0.06, 0.35, 8);
      const leftUpperArm = new THREE.Mesh(leftUpperArmGeo, boneMat);
      leftUpperArm.position.set(-0.25, 1.55, 0);
      leftUpperArm.rotation.z = 0.3;
      leftUpperArm.castShadow = true;
      leftUpperArm.name = 'mixamorig:LeftArm';
      group.add(leftUpperArm);

      // الذراع اليسرى السفلية
      const leftLowerArmGeo = new THREE.CylinderGeometry(0.04, 0.05, 0.3, 8);
      const leftLowerArm = new THREE.Mesh(leftLowerArmGeo, boneMat);
      leftLowerArm.position.set(-0.45, 1.25, 0);
      leftLowerArm.castShadow = true;
      leftLowerArm.name = 'mixamorig:LeftForeArm';
      group.add(leftLowerArm);

      // قبضة اليد اليسرى
      const leftHandGeo = new THREE.SphereGeometry(0.06, 8, 8);
      const leftHand = new THREE.Mesh(leftHandGeo, darkBoneMat);
      leftHand.position.set(-0.52, 0.98, 0);
      leftHand.castShadow = true;
      leftHand.name = 'mixamorig:LeftHand';
      group.add(leftHand);

      // الذراع اليمنى العلوية
      const rightUpperArmGeo = new THREE.CylinderGeometry(0.05, 0.06, 0.35, 8);
      const rightUpperArm = new THREE.Mesh(rightUpperArmGeo, boneMat);
      rightUpperArm.position.set(0.25, 1.55, 0);
      rightUpperArm.rotation.z = -0.3;
      rightUpperArm.castShadow = true;
      rightUpperArm.name = 'mixamorig:RightArm';
      group.add(rightUpperArm);

      // الذراع اليمنى السفلية
      const rightLowerArmGeo = new THREE.CylinderGeometry(0.04, 0.05, 0.3, 8);
      const rightLowerArm = new THREE.Mesh(rightLowerArmGeo, boneMat);
      rightLowerArm.position.set(0.45, 1.25, 0);
      rightLowerArm.castShadow = true;
      rightLowerArm.name = 'mixamorig:RightForeArm';
      group.add(rightLowerArm);

      // قبضة اليد اليمنى
      const rightHandGeo = new THREE.SphereGeometry(0.06, 8, 8);
      const rightHand = new THREE.Mesh(rightHandGeo, darkBoneMat);
      rightHand.position.set(0.52, 0.98, 0);
      rightHand.castShadow = true;
      rightHand.name = 'mixamorig:RightHand';
      group.add(rightHand);

      // الفخذ الأيسر
      const leftThighGeo = new THREE.CylinderGeometry(0.06, 0.08, 0.4, 8);
      const leftThigh = new THREE.Mesh(leftThighGeo, boneMat);
      leftThigh.position.set(-0.1, 0.65, 0);
      leftThigh.castShadow = true;
      leftThigh.name = 'mixamorig:LeftUpLeg';
      group.add(leftThigh);

      // الساق اليسرى
      const leftShinGeo = new THREE.CylinderGeometry(0.05, 0.06, 0.4, 8);
      const leftShin = new THREE.Mesh(leftShinGeo, boneMat);
      leftShin.position.set(-0.1, 0.3, 0);
      leftShin.castShadow = true;
      leftShin.name = 'mixamorig:LeftLeg';
      group.add(leftShin);

      // القدم اليسرى
      const leftFootGeo = new THREE.BoxGeometry(0.08, 0.06, 0.18);
      const leftFoot = new THREE.Mesh(leftFootGeo, darkBoneMat);
      leftFoot.position.set(-0.1, 0.05, 0.05);
      leftFoot.castShadow = true;
      leftFoot.name = 'mixamorig:LeftFoot';
      group.add(leftFoot);

      // الفخذ الأيمن
      const rightThighGeo = new THREE.CylinderGeometry(0.06, 0.08, 0.4, 8);
      const rightThigh = new THREE.Mesh(rightThighGeo, boneMat);
      rightThigh.position.set(0.1, 0.65, 0);
      rightThigh.castShadow = true;
      rightThigh.name = 'mixamorig:RightUpLeg';
      group.add(rightThigh);

      // الساق اليمنى
      const rightShinGeo = new THREE.CylinderGeometry(0.05, 0.06, 0.4, 8);
      const rightShin = new THREE.Mesh(rightShinGeo, boneMat);
      rightShin.position.set(0.1, 0.3, 0);
      rightShin.castShadow = true;
      rightShin.name = 'mixamorig:RightLeg';
      group.add(rightShin);

      // القدم اليمنى
      const rightFootGeo = new THREE.BoxGeometry(0.08, 0.06, 0.18);
      const rightFoot = new THREE.Mesh(rightFootGeo, darkBoneMat);
      rightFoot.position.set(0.1, 0.05, 0.05);
      rightFoot.castShadow = true;
      rightFoot.name = 'mixamorig:RightFoot';
      group.add(rightFoot);

      group.userData = { color: colorHex, punching: false, punchCooldown: 0 };
      return group;
    }

    // ╔══════════════════════════════════════╗
    // ║        اللاعبون والفيزياء          ║
    // ╚══════════════════════════════════════╝
    const localPlayer = {
      id: null,
      name: 'لاعب',
      color: '#FF6B6B',
      mesh: null,
      position: new THREE.Vector3(0, 0.5, 0),
      velocity: new THREE.Vector3(),
      direction: new THREE.Vector3(),
      health: 100,
      score: 0,
      alive: true,
      punching: false,
      punchCooldown: 0,
      grounded: true,
    };

    const remotePlayers = {}; // id -> { mesh, targetPos, color, name, ... }

    // ╔══════════════════════════════════════╗
    // ║        التحكم (موبايل + كمبيوتر)    ║
    // ╚══════════════════════════════════════╝
    const keys = {};
    let joystickActive = false;
    let joystickBase = { x: 0, y: 0 };
    let joystickThumb = { x: 0, y: 0 };
    let joystickTouchId = null;
    let punchPressed = false;

    // لوحة المفاتيح
    window.addEventListener('keydown', (e) => {
      keys[e.key.toLowerCase()] = true;
      if (e.key === ' ' || e.key === 'Spacebar') {
        punchPressed = true;
        e.preventDefault();
      }
    });
    window.addEventListener('keyup', (e) => {
      keys[e.key.toLowerCase()] = false;
      if (e.key === ' ' || e.key === 'Spacebar') punchPressed = false;
    });

    // عصا التحكم باللمس
    canvas.addEventListener('touchstart', (e) => {
      for (const touch of e.changedTouches) {
        const tx = touch.clientX;
        const ty = touch.clientY;

        // عصا التحكم (النصف الأيسر السفلي)
        if (tx < window.innerWidth * 0.45 && ty > window.innerHeight * 0.4) {
          joystickActive = true;
          joystickTouchId = touch.identifier;
          joystickBase.x = tx;
          joystickBase.y = ty;
          joystickThumb.x = tx;
          joystickThumb.y = ty;
        }

        // زر اللكمة (النصف الأيمن السفلي)
        if (tx > window.innerWidth * 0.55 && ty > window.innerHeight * 0.5) {
          punchPressed = true;
        }
      }
      e.preventDefault();
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
      if (!joystickActive) return;
      for (const touch of e.changedTouches) {
        if (touch.identifier === joystickTouchId) {
          const dx = touch.clientX - joystickBase.x;
          const dy = touch.clientY - joystickBase.y;
          const maxDist = 55;
          const dist = Math.sqrt(dx * dx + dy * dy);
          const clampDist = Math.min(dist, maxDist);
          const angle = Math.atan2(dy, dx);
          joystickThumb.x = joystickBase.x + Math.cos(angle) * clampDist;
          joystickThumb.y = joystickBase.y + Math.sin(angle) * clampDist;
          if (dist > 8) {
            localPlayer.direction.set(Math.cos(angle), 0, Math.sin(angle) * (dist / maxDist));
          } else {
            localPlayer.direction.set(0, 0, 0);
          }
        }
      }
      e.preventDefault();
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
      for (const touch of e.changedTouches) {
        if (touch.identifier === joystickTouchId) {
          joystickActive = false;
          joystickTouchId = null;
          joystickThumb.x = joystickBase.x;
          joystickThumb.y = joystickBase.y;
          localPlayer.direction.set(0, 0, 0);
        }
        // رفع زر اللكمة
        if (touch.clientX > window.innerWidth * 0.55 && touch.clientY > window.innerHeight * 0.5) {
          punchPressed = false;
        }
      }
      e.preventDefault();
    }, { passive: false });

    // تحديث الاتجاه من لوحة المفاتيح
    function updateKeyboardDirection() {
      if (joystickActive) return;
      let dx = 0, dz = 0;
      if (keys['w'] || keys['arrowup']) dz = -1;
      if (keys['s'] || keys['arrowdown']) dz = 1;
      if (keys['a'] || keys['arrowleft']) dx = -1;
      if (keys['d'] || keys['arrowright']) dx = 1;
      const len = Math.sqrt(dx * dx + dz * dz);
      if (len > 0) {
        localPlayer.direction.set(dx / len, 0, dz / len);
      } else {
        localPlayer.direction.set(0, 0, 0);
      }
    }

    // ╔══════════════════════════════════════╗
    // ║            Socket.io               ║
    // ╚══════════════════════════════════════╝
    const socket = io();
    let myRoomId = null;
    let gameActive = false;

    socket.on('connect', () => {
      console.log('✅ متصل بالسيرفر');
    });

    socket.on('joinedLobby', (data) => {
      myRoomId = data.roomId;
      localPlayer.id = data.playerId;
      localPlayer.color = data.playerColor;

      // إنشاء شخصيتي
      if (localPlayer.mesh) scene.remove(localPlayer.mesh);
      localPlayer.mesh = createSkeletonCharacter(data.playerColor);
      localPlayer.mesh.position.copy(localPlayer.position);
      scene.add(localPlayer.mesh);

      updateWaitingScreen(data.players, data.count);
      showWaitingScreen();
      updateStatus('✅ متصل - بانتظار لاعبين آخرين...');
    });

    socket.on('playerJoinedLobby', (data) => {
      updateStatus(`👤 ${data.name} انضم! (${data.count}/${data.max})`);
      // تحديث قائمة الانتظار
      socket.emit('requestLobbyUpdate');
    });

    socket.on('playerLeftLobby', (data) => {
      updateStatus(`👋 لاعب غادر (${data.count}/${data.max})`);
      socket.emit('requestLobbyUpdate');
    });

    socket.on('lobbyWaiting', (data) => {
      document.getElementById('waitHint').textContent =
        `⏱️ سيبدأ تلقائياً بعد ${data.timeout} ثانية إذا لم يكتمل العدد`;
    });

    socket.on('lobbyCountdown', (data) => {
      document.getElementById('countdownDisplay').textContent = data.seconds;
      updateWaitingScreen(data.players, data.players.length);
    });

    socket.on('lobbyCancelled', (data) => {
      updateStatus(data.message);
      document.getElementById('countdownDisplay').textContent = '';
    });

    socket.on('gameStart', (data) => {
      gameActive = true;
      hideWaitingScreen();
      document.getElementById('hud').classList.add('active');

      // تحديث موقعي
      const myData = data.players.find(p => p.id === localPlayer.id);
      if (myData) {
        localPlayer.position.set(myData.x, myData.y, myData.z);
        localPlayer.health = myData.health;
        localPlayer.score = myData.score;
        localPlayer.alive = myData.alive;
        if (localPlayer.mesh) {
          localPlayer.mesh.position.copy(localPlayer.position);
        }
      }

      // إنشاء شخصيات اللاعبين الآخرين
      data.players.forEach(p => {
        if (p.id === localPlayer.id) return;
        if (remotePlayers[p.id]) {
          scene.remove(remotePlayers[p.id].mesh);
        }
        const mesh = createSkeletonCharacter(p.color);
        mesh.position.set(p.x, p.y, p.z);
        scene.add(mesh);
        remotePlayers[p.id] = {
          mesh: mesh,
          targetPos: new THREE.Vector3(p.x, p.y, p.z),
          color: p.color,
          name: p.name,
          health: p.health,
          score: p.score,
          alive: p.alive,
          punching: false,
        };
      });

      updateStatus('🔥 القتال بدأ!');
    });

    socket.on('gameUpdate', (data) => {
      if (!gameActive) return;

      data.players.forEach(p => {
        if (p.id === localPlayer.id) return;
        if (remotePlayers[p.id]) {
          remotePlayers[p.id].targetPos.set(p.x, p.y, p.z);
          remotePlayers[p.id].health = p.health;
          remotePlayers[p.id].score = p.score;
          remotePlayers[p.id].alive = p.alive;
          remotePlayers[p.id].punching = p.punching;
        }
      });

      // تحديث المؤقت
      const remaining = Math.ceil(data.remaining / 1000);
      const mins = Math.floor(remaining / 60);
      const secs = remaining % 60;
      document.getElementById('timerDisplay').textContent =
        `${mins}:${secs.toString().padStart(2, '0')}`;

      updateHUD();
    });

    socket.on('playerUpdate', (data) => {
      if (remotePlayers[data.id]) {
        remotePlayers[data.id].targetPos.set(data.x, data.y, data.z);
        remotePlayers[data.id].health = data.health;
        remotePlayers[data.id].score = data.score;
        remotePlayers[data.id].alive = data.alive;
        remotePlayers[data.id].punching = data.punching;
      }
    });

    socket.on('playerPunched', (data) => {
      if (data.targetId === localPlayer.id) {
        // تلقيت ضربة
        localPlayer.health -= data.power;
        localPlayer.score = Math.max(0, localPlayer.score - Math.floor(data.power / 2));

        // تأثير ارتداد
        const knockback = new THREE.Vector3(data.direction.x, data.direction.y, data.direction.z)
          .normalize().multiplyScalar(data.power * 0.05);
        localPlayer.velocity.add(knockback);

        shakeCamera(0.3, 0.15);
        flashScreen('#FF0000', 150);

        if (localPlayer.health <= 0) {
          localPlayer.health = 0;
          localPlayer.alive = false;
          localPlayer.score = Math.max(0, localPlayer.score - 20);
          updateStatus('💀 لقد هُزمت!');
        }
      }

      // تأثير مرئي على المهاجم
      if (remotePlayers[data.attackerId]) {
        remotePlayers[data.attackerId].punching = true;
        setTimeout(() => {
          if (remotePlayers[data.attackerId]) {
            remotePlayers[data.attackerId].punching = false;
          }
        }, 300);
      }
    });

    socket.on('gameEnd', (data) => {
      gameActive = false;
      showEndScreen(data);
    });

    socket.on('joinError', (data) => {
      updateStatus('❌ ' + data.message);
      document.getElementById('playBtn').disabled = false;
    });

    socket.on('disconnect', () => {
      updateStatus('❌ انقطع الاتصال');
      gameActive = false;
    });

    // طلب تحديث قائمة اللوبي
    socket.on('requestLobbyUpdate', () => {
      // يُستخدم داخلياً
    });

    // ╔══════════════════════════════════════╗
    // ║        دوال واجهة المستخدم         ║
    // ╚══════════════════════════════════════╝
    function updateStatus(msg) {
      document.getElementById('statusText').textContent = msg;
    }

    function showWaitingScreen() {
      document.getElementById('waitingScreen').classList.add('active');
      document.getElementById('mainMenu').classList.add('hidden');
    }

    function hideWaitingScreen() {
      document.getElementById('waitingScreen').classList.remove('active');
    }

    function updateWaitingScreen(players, count) {
      const listEl = document.getElementById('playersList');
      listEl.innerHTML = '';
      players.forEach(p => {
        const tag = document.createElement('span');
        tag.className = 'playerTag' + (p.id === localPlayer.id ? ' me' : '');
        tag.style.borderColor = p.color;
        tag.textContent = p.name;
        listEl.appendChild(tag);
      });
      document.getElementById('waitHint').textContent =
        `اللاعبون: ${count}/4 | الحد الأدنى: 2`;
    }

    function showEndScreen(data) {
      document.getElementById('endScreen').classList.add('active');
      document.getElementById('hud').classList.remove('active');
      const rankList = document.getElementById('rankList');
      rankList.innerHTML = '';
      const medals = ['🥇', '🥈', '🥉', '4️⃣'];
      data.players.forEach((p, i) => {
        const div = document.createElement('div');
        div.className = 'rankItem';
        div.innerHTML = `<span>${medals[i] || ''} ${p.name}</span><span>${p.score} نقطة</span>`;
        div.style.color = p.color;
        rankList.appendChild(div);
      });
    }

    function updateHUD() {
      document.getElementById('healthFill').style.width = localPlayer.health + '%';
      document.getElementById('scoreDisplay').textContent = '💀 ' + localPlayer.score;
      if (localPlayer.health < 30) {
        document.getElementById('healthFill').style.background = '#FF0000';
      } else if (localPlayer.health < 60) {
        document.getElementById('healthFill').style.background = '#FFA500';
      } else {
        document.getElementById('healthFill').style.background = '#FF6B6B';
      }
    }

    // تأثيرات الكاميرا والشاشة
    let cameraShake = { intensity: 0, duration: 0, elapsed: 0 };
    function shakeCamera(intensity, duration) {
      cameraShake.intensity = intensity;
      cameraShake.duration = duration;
      cameraShake.elapsed = 0;
    }

    let screenFlash = { color: null, duration: 0, elapsed: 0, element: null };
    function flashScreen(color, duration) {
      if (!screenFlash.element) {
        screenFlash.element = document.createElement('div');
        screenFlash.element.style.cssText = `
          position: fixed; top: 0; left: 0; width: 100%; height: 100%;
          pointer-events: none; z-index: 50; transition: opacity 0.1s;
        `;
        document.body.appendChild(screenFlash.element);
      }
      screenFlash.element.style.background = color;
      screenFlash.element.style.opacity = '0.5';
      screenFlash.duration = duration;
      screenFlash.elapsed = 0;
    }

    // ╔══════════════════════════════════════╗
    // ║        حلقة اللعبة الرئيسية        ║
    // ╚══════════════════════════════════════╝
    const clock = new THREE.Clock();
    let lastServerUpdate = 0;

    function gameLoop(time) {
      requestAnimationFrame(gameLoop);

      const dt = Math.min(clock.getDelta(), 0.1);

      // تحديث الاتجاه من لوحة المفاتيح
      updateKeyboardDirection();

      // فيزياء مبسطة للاعب المحلي
      if (gameActive && localPlayer.alive) {
        const speed = 6;
        const moveDir = localPlayer.direction.clone();

        // تسارع
        localPlayer.velocity.x += moveDir.x * speed * dt * 3;
        localPlayer.velocity.z += moveDir.z * speed * dt * 3;

        // احتكاك
        localPlayer.velocity.x *= 0.9;
        localPlayer.velocity.z *= 0.9;

        // جاذبية
        localPlayer.velocity.y -= 9.8 * dt;
        if (localPlayer.position.y <= 0.5) {
          localPlayer.position.y = 0.5;
          localPlayer.velocity.y = 0;
          localPlayer.grounded = true;
        }

        // تحديث الموقع
        localPlayer.position.x += localPlayer.velocity.x * dt;
        localPlayer.position.y += localPlayer.velocity.y * dt;
        localPlayer.position.z += localPlayer.velocity.z * dt;

        // تقييد داخل الحلبة
        const dist = Math.sqrt(
          localPlayer.position.x ** 2 + localPlayer.position.z ** 2
        );
        const maxDist = 5.5;
        if (dist > maxDist) {
          const nx = localPlayer.position.x / dist;
          const nz = localPlayer.position.z / dist;
          localPlayer.position.x = nx * maxDist;
          localPlayer.position.z = nz * maxDist;
          localPlayer.velocity.x *= -0.3;
          localPlayer.velocity.z *= -0.3;
        }

        // اللكم
        if (punchPressed && localPlayer.punchCooldown <= 0) {
          performPunch();
        }
        if (localPlayer.punchCooldown > 0) {
          localPlayer.punchCooldown -= dt;
        }

        // فحص التصادم مع الأشياء القابلة للكسر
        for (let i = breakables.length - 1; i >= 0; i--) {
          const obj = breakables[i];
          const dx = localPlayer.position.x - obj.position.x;
          const dz = localPlayer.position.z - obj.position.z;
          const dy = localPlayer.position.y - obj.position.y;
          const dist2 = Math.sqrt(dx * dx + dz * dz + dy * dy);

          if (dist2 < 0.8 && obj.userData.isBreakable) {
            obj.userData.health -= 30 * dt;
            if (obj.userData.health <= 0) {
              spawnDebris(obj.position);
              scene.remove(obj);
              breakables.splice(i, 1);
              localPlayer.score += 5;
            }
          }
        }

        // تحديث شخصيتي
        if (localPlayer.mesh) {
          localPlayer.mesh.position.copy(localPlayer.position);
          if (moveDir.length() > 0.1) {
            const angle = Math.atan2(moveDir.x, moveDir.z);
            localPlayer.mesh.rotation.y = angle;
          }
        }

        // إرسال التحديث للسيرفر (10 مرات في الثانية)
        if (time - lastServerUpdate > 100) {
          lastServerUpdate = time;
          socket.emit('playerMove', {
            x: localPlayer.position.x,
            y: localPlayer.position.y,
            z: localPlayer.position.z,
            dirX: localPlayer.direction.x,
            dirZ: localPlayer.direction.z,
            punching: localPlayer.punching,
            health: localPlayer.health,
            score: localPlayer.score,
            alive: localPlayer.alive,
          });
        }
      }

      // تنعيم حركة اللاعبين الآخرين
      for (const [id, rp] of Object.entries(remotePlayers)) {
        if (rp.mesh && rp.targetPos) {
          rp.mesh.position.lerp(rp.targetPos, 8 * dt);
          // اهتزاز عند اللكم
          if (rp.punching) {
            rp.mesh.position.x += (Math.random() - 0.5) * 0.1;
            rp.mesh.position.y += (Math.random() - 0.5) * 0.05;
          }
          if (!rp.alive) {
            rp.mesh.position.y = Math.max(0.1, rp.mesh.position.y - 2 * dt);
            rp.mesh.rotation.x += 2 * dt;
          }
        }
      }

      // تحديث الجسيمات
      for (let i = debrisParticles.length - 1; i >= 0; i--) {
        const p = debrisParticles[i];
        p.userData.velocity.y -= 9.8 * dt;
        p.position.x += p.userData.velocity.x * dt;
        p.position.y += p.userData.velocity.y * dt;
        p.position.z += p.userData.velocity.z * dt;
        p.userData.life -= dt;
        if (p.userData.life <= 0 || p.position.y < -5) {
          scene.remove(p);
          debrisParticles.splice(i, 1);
        }
      }

      // تأثيرات الكاميرا
      if (cameraShake.elapsed < cameraShake.duration) {
        cameraShake.elapsed += dt;
        const progress = cameraShake.elapsed / cameraShake.duration;
        const intensity = cameraShake.intensity * (1 - progress);
        camera.position.x += (Math.random() - 0.5) * intensity;
        camera.position.y += (Math.random() - 0.5) * intensity;
      }

      // تأثير فلاش الشاشة
      if (screenFlash.elapsed < screenFlash.duration) {
        screenFlash.elapsed += dt * 1000;
        const progress = screenFlash.elapsed / screenFlash.duration;
        screenFlash.element.style.opacity = 0.5 * (1 - progress);
        if (progress >= 1) {
          screenFlash.element.style.opacity = '0';
        }
      }

      // تحديث الكاميرا لتتبع اللاعب
      if (gameActive && localPlayer.alive && localPlayer.mesh) {
        const targetCamPos = new THREE.Vector3(
          localPlayer.position.x,
          localPlayer.position.y + 10,
          localPlayer.position.z + 8
        );
        camera.position.lerp(targetCamPos, 3 * dt);
        camera.lookAt(localPlayer.position);
      }

      renderer.render(scene, camera);
    }

    // تنفيذ اللكمة
    function performPunch() {
      if (!gameActive || !localPlayer.alive || localPlayer.punchCooldown > 0) return;

      localPlayer.punching = true;
      localPlayer.punchCooldown = 0.6;

      // فحص إصابة اللاعبين الآخرين
      for (const [id, rp] of Object.entries(remotePlayers)) {
        if (!rp.alive) continue;
        const dx = localPlayer.position.x - rp.mesh.position.x;
        const dz = localPlayer.position.z - rp.mesh.position.z;
        const dist = Math.sqrt(dx * dx + dz * dz);

        if (dist < 1.5) {
          const power = 10 + Math.random() * 10;
          const dir = new THREE.Vector3(dx, 0.3, dz).normalize();

          socket.emit('playerPunch', {
            targetId: id,
            power: power,
            direction: { x: dir.x, y: dir.y, z: dir.z },
          });

          localPlayer.score += Math.floor(power);
          flashScreen('#FFE082', 100);
        }
      }

      // كسر الأشياء القريبة
      for (let i = breakables.length - 1; i >= 0; i--) {
        const obj = breakables[i];
        const dx = localPlayer.position.x - obj.position.x;
        const dz = localPlayer.position.z - obj.position.z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        if (dist < 1.2 && obj.userData.isBreakable) {
          obj.userData.health -= 40;
          if (obj.userData.health <= 0) {
            spawnDebris(obj.position);
            scene.remove(obj);
            breakables.splice(i, 1);
            localPlayer.score += 10;
          }
        }
      }

      setTimeout(() => { localPlayer.punching = false; }, 300);
    }

    // ╔══════════════════════════════════════╗
    // ║        رسم عصا التحكم             ║
    // ╚══════════════════════════════════════╝
    function drawJoystick2D() {
      // سنستخدم عنصر Canvas منفصل أو نظيف
      // تم تبسيط الرسم للتركيز على الوظائف الأساسية
    }

    // ╔══════════════════════════════════════╗
    // ║        أزرار الواجهة               ║
    // ╚══════════════════════════════════════╝
    document.getElementById('playBtn').addEventListener('click', () => {
      const name = document.getElementById('nameInput').value.trim() || 'لاعب';
      document.getElementById('playBtn').disabled = true;
      updateStatus('⏳ جاري البحث عن لاعبين...');
      socket.emit('joinLobby', { name: name });
      localPlayer.name = name;
    });

    document.getElementById('nameInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        document.getElementById('playBtn').click();
      }
    });

    document.getElementById('replayBtn').addEventListener('click', () => {
      document.getElementById('endScreen').classList.remove('active');
      document.getElementById('mainMenu').classList.remove('hidden');
      document.getElementById('playBtn').disabled = false;
      updateStatus('');
      localPlayer.health = 100;
      localPlayer.score = 0;
      localPlayer.alive = true;
      localPlayer.velocity.set(0, 0, 0);
      // إزالة اللاعبين الآخرين
      for (const [id, rp] of Object.entries(remotePlayers)) {
        scene.remove(rp.mesh);
        delete remotePlayers[id];
      }
      // إعادة تعيين الأشياء القابلة للكسر
      breakables.forEach(b => scene.remove(b));
      breakables.length = 0;
      breakableMeshes.length = 0;
      for (let i = 0; i < 15; i++) {
        const angle = Math.random() * Math.PI * 2;
        const dist = 7 + Math.random() * 3;
        createBreakable(Math.cos(angle) * dist, Math.sin(angle) * dist);
      }
    });

    // استجابة لتغيير حجم النافذة
    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });

    // ╔══════════════════════════════════════╗
    // ║        بدء الحلقة                  ║
    // ╚══════════════════════════════════════╝
    requestAnimationFrame(gameLoop);
    console.log('💀 Bone Brawl جاهزة!');
    console.log('📱 موبايل: عصا تحكم يسار + زر لكمة يمين');
    console.log('⌨️ كمبيوتر: WASD للحركة | Space للكم');
    console.log('👥 الحد الأدنى: لاعبان | الحد الأقصى: 4 لاعبين');
  </script>
